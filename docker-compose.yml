services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: marketplace_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-marketplace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marketplace_dev}
      POSTGRES_DB: ${POSTGRES_DB:-marketplace}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - marketplace_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marketplace} -d ${POSTGRES_DB:-marketplace}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  marketplace_pgdata:
